services:
  db:
    image: postgis/postgis:16-3.5
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    container_name: wa_roads_postgis
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wa_roads}
      POSTGRES_USER: ${POSTGRES_USER:-wa_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wa_password}
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
      - ./sql/ddl:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wa_admin} -d ${POSTGRES_DB:-wa_roads}"]
      interval: 10s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:8.14
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    container_name: wa_roads_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin123}
    ports:
      - "5051:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgis_data:
